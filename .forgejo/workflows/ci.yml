name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  lint:
    runs-on: docker
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install server deps
        run: npm ci --prefix server

      - name: Install client deps
        run: npm ci --prefix client

      - name: Lint
        run: npm run lint

      - name: Build client
        run: npm run build
